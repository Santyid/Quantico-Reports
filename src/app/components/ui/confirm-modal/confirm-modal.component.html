@if (visible) {
  <div class="confirm-modal__overlay" (click)="onOverlayClick($event)">
    <div [class]="'confirm-modal confirm-modal--' + resolvedVariant" role="dialog" aria-modal="true">

      <!-- Close button -->
      <button type="button" class="confirm-modal__close" aria-label="Cerrar" (click)="onCancel()">
        <lucide-icon [img]="XIcon" [size]="20" [strokeWidth]="1.5"></lucide-icon>
      </button>

      <!-- Header -->
      <div class="confirm-modal__header">
        <div class="confirm-modal__icon-wrap">
          <lucide-icon [img]="variantIcon" [size]="32" [strokeWidth]="1.5"></lucide-icon>
        </div>
        <h2 class="confirm-modal__title">{{ title }}</h2>
      </div>

      <!-- Message -->
      <div class="confirm-modal__message-box">
        <p class="confirm-modal__message" [innerHTML]="message"></p>
      </div>

      <!-- Actions -->
      <div class="confirm-modal__actions">
        <app-button
          variant="white"
          size="medium"
          (clicked)="onCancel()">
          {{ cancelText }}
        </app-button>
        <button
          type="button"
          class="confirm-modal__confirm-btn"
          (click)="onConfirm()">
          {{ confirmText }}
        </button>
      </div>

    </div>
  </div>
}
