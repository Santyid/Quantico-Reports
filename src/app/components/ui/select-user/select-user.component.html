<div class="select-user" [class.select-user--medium]="size === 'medium'">
  @for (option of options; track option.id) {
    <button
      class="select-user__item"
      [class.select-user__item--hover]="hoveredId === option.id"
      [class.select-user__item--selected]="isSelected(option)"
      (click)="onSelect(option)"
      (mouseenter)="onMouseEnter(option.id)"
      (mouseleave)="onMouseLeave()"
      type="button"
      [attr.aria-label]="'Seleccionar ' + option.name"
      [attr.aria-pressed]="isSelected(option)">
      <div class="select-user__inner"
        [class.select-user__inner--selected]="isSelected(option)">
        <app-avatar-social
          [size]="size === 'medium' ? 'medium' : 'large'"
          [avatarUrl]="option.avatarUrl"
          [platformIconUrl]="option.platformIconUrl"
          [showBadge]="!!option.platformIconUrl"
          [alt]="option.name">
        </app-avatar-social>
        <span class="select-user__name">{{ option.name }}</span>
      </div>
    </button>
  }
</div>
