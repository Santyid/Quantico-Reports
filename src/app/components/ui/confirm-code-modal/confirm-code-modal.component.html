@if (visible) {
  <div class="confirm-code-modal__overlay" (click)="onOverlayClick($event)">
    <div class="confirm-code-modal" role="dialog" aria-modal="true">

      <!-- Close button -->
      <button type="button" class="confirm-code-modal__close" aria-label="Cerrar" (click)="onCancel()">
        <lucide-icon [img]="XIcon" [size]="20" [strokeWidth]="1.5"></lucide-icon>
      </button>

      <!-- Header -->
      <div class="confirm-code-modal__header">
        <div class="confirm-code-modal__icon-wrap">
          <lucide-icon [img]="TriangleAlertIcon" [size]="32" [strokeWidth]="1.5"></lucide-icon>
        </div>
        <h2 class="confirm-code-modal__title">{{ title }}</h2>
      </div>

      <!-- Message -->
      <div class="confirm-code-modal__message-box">
        <p class="confirm-code-modal__message" [innerHTML]="message"></p>
      </div>

      <!-- Verification section -->
      <div class="confirm-code-modal__verify">
        <p class="confirm-code-modal__verify-instruction">
          Para confirmar, escribe el siguiente código en el campo de verificación:
        </p>

        <div class="confirm-code-modal__code-row">
          <span class="confirm-code-modal__code">{{ code }}</span>
          <button
            type="button"
            class="confirm-code-modal__copy-btn"
            aria-label="Copiar código"
            (click)="copyCode()">
            <lucide-icon [img]="codeCopied ? CheckIcon : CopyIcon" [size]="16" [strokeWidth]="1.5"></lucide-icon>
          </button>
        </div>

        <div class="confirm-code-modal__input-row">
          <input
            type="text"
            class="confirm-code-modal__input"
            [placeholder]="inputPlaceholder"
            [(ngModel)]="inputValue"
            (keydown.enter)="onConfirm()">
        </div>
      </div>

      <!-- Actions -->
      <div class="confirm-code-modal__actions">
        <app-button
          variant="white"
          size="medium"
          (clicked)="onCancel()">
          {{ cancelText }}
        </app-button>
        <button
          type="button"
          class="confirm-code-modal__confirm-btn"
          [class.confirm-code-modal__confirm-btn--disabled]="!isCodeValid"
          [disabled]="!isCodeValid"
          (click)="onConfirm()">
          {{ confirmText }}
        </button>
      </div>

    </div>
  </div>
}
