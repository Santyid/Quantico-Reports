<div class="select-colorpicker">
  @for (option of options; track option.id) {
    <button
      class="select-colorpicker__item"
      [class.select-colorpicker__item--hover]="hoveredId === option.id"
      [class.select-colorpicker__item--selected]="isSelected(option)"
      (click)="onSelect(option)"
      (mouseenter)="onMouseEnter(option.id)"
      (mouseleave)="onMouseLeave()"
      type="button"
      [attr.aria-label]="'Seleccionar ' + option.name"
      [attr.aria-pressed]="isSelected(option)">
      <div class="select-colorpicker__inner"
        [class.select-colorpicker__inner--selected]="isSelected(option)">
        <div
          class="select-colorpicker__dot"
          [style.background]="getColorGradient(option.color)">
        </div>
        <span class="select-colorpicker__name">{{ option.name }}</span>
      </div>
    </button>
  }
</div>
