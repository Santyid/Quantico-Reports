<div class="fb-rendimiento">
  <h3 class="fb-rendimiento__title">Rendimiento global</h3>
  <div class="fb-rendimiento__grid">
    @for (metric of metrics; track metric.label; let i = $index) {
      <div class="fb-rendimiento__kpi">
        <div class="fb-rendimiento__kpi-content">
          <div class="fb-rendimiento__kpi-top">
            <span class="fb-rendimiento__kpi-value">{{ metric.value }}</span>
            <span
              class="fb-rendimiento__kpi-badge"
              [class.fb-rendimiento__kpi-badge--negative]="metric.change < 0">
              <lucide-icon
                [img]="metric.change >= 0 ? TrendingUpIcon : TrendingDownIcon"
                [size]="12"
                [strokeWidth]="2">
              </lucide-icon>
              <span>{{ metric.change > 0 ? '+' : '' }}{{ metric.change }}%</span>
            </span>
          </div>
          <div class="fb-rendimiento__kpi-label-row">
            <span class="fb-rendimiento__kpi-label">{{ metric.label }}</span>
            <lucide-icon
              [img]="InfoIcon"
              [size]="14"
              [strokeWidth]="1.5"
              class="fb-rendimiento__kpi-info-icon">
            </lucide-icon>
          </div>
        </div>
        <div class="fb-rendimiento__sparkline">
          <svg viewBox="0 0 100 40" preserveAspectRatio="none">
            <defs>
              <linearGradient [attr.id]="'fbSparkGrad-' + i" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" [attr.stop-color]="metric.change >= 0 ? '#3ace76' : '#f44336'" stop-opacity="0.3"/>
                <stop offset="100%" [attr.stop-color]="metric.change >= 0 ? '#3ace76' : '#f44336'" stop-opacity="0.02"/>
              </linearGradient>
            </defs>
            <path
              [attr.d]="getSparklineAreaPath(metric.sparklineData)"
              [attr.fill]="'url(#fbSparkGrad-' + i + ')'" />
            <path
              [attr.d]="getSparklinePath(metric.sparklineData)"
              fill="none"
              [attr.stroke]="metric.change >= 0 ? '#3ace76' : '#f44336'"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
    }
  </div>
</div>
