<div class="interacciones">
  <div class="interacciones__header">
    <h3 class="interacciones__title">Interacciones</h3>
    <div class="interacciones__header-right">
      <span class="interacciones__header-value">{{ total }}</span>
      <span class="interacciones__header-label">total</span>
      <button class="interacciones__menu-btn" aria-label="More options">
        <lucide-icon [img]="MoreHorizontalIcon" [size]="20" [strokeWidth]="1.5"></lucide-icon>
      </button>
    </div>
  </div>
  <div class="interacciones__content">
    <div class="interacciones__bar">
      @for (type of types; track type.label) {
        <div
          class="interacciones__bar-segment"
          [style.width.%]="type.value"
          [style.background]="'linear-gradient(90deg, ' + type.color + 'cc 0%, ' + type.color + ' 100%)'">
        </div>
      }
    </div>
    <div class="interacciones__legend">
      @for (type of types; track type.label) {
        <div class="interacciones__legend-item">
          <span class="interacciones__legend-dot" [style.background]="type.color"></span>
          <span class="interacciones__legend-label">{{ type.label }}</span>
          <lucide-icon class="interacciones__legend-info" [img]="InfoIcon" [size]="14" [strokeWidth]="1.5"></lucide-icon>
          <span class="interacciones__legend-count">{{ type.count }}</span>
        </div>
      }
    </div>
  </div>
</div>
