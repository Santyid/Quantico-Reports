<div class="acciones-neg">
  <div class="acciones-neg__header">
    <h3 class="acciones-neg__title">Acciones que generan negocio</h3>
    <button class="acciones-neg__menu-btn" aria-label="Más opciones">
      <lucide-icon [img]="MoreHorizontalIcon" [size]="20" [strokeWidth]="1.5"></lucide-icon>
    </button>
  </div>
  <div class="acciones-neg__content">
    @for (action of actions; track action.label) {
      <div class="acciones-neg__stat">
        <div class="acciones-neg__stat-top">
          <span class="acciones-neg__stat-value">{{ action.value }}</span>
          <span class="acciones-neg__stat-badge">
            <lucide-icon [img]="ArrowUpRightIcon" [size]="14" [strokeWidth]="2"></lucide-icon>
            +{{ action.change }}%
          </span>
        </div>
        <div class="acciones-neg__stat-label-row">
          <span class="acciones-neg__stat-label">{{ action.label }}</span>
          <lucide-icon [img]="InfoIcon" [size]="14" [strokeWidth]="1.5" class="acciones-neg__info-icon"></lucide-icon>
        </div>
      </div>
    }
  </div>
</div>
