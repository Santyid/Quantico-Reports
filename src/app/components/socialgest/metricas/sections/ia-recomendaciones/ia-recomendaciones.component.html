<div class="ia-recomendaciones">
  <div class="ia-recomendaciones__container">
    <div class="ia-recomendaciones__header">
      <lucide-icon [img]="SparklesIcon" [size]="22" [strokeWidth]="1.5"></lucide-icon>
      <h3 class="ia-recomendaciones__title">Recomendaciones de la IA</h3>
    </div>

    <div class="ia-recomendaciones__grid">
      @for (rec of recomendaciones; track rec.titulo) {
        <div class="ia-recomendaciones__card">
          <div class="ia-recomendaciones__card-badge">
            <span
              class="ia-recomendaciones__card-dot"
              [style.background]="getPrioridadColor(rec.prioridad)">
            </span>
            <span class="ia-recomendaciones__card-priority">{{ rec.prioridad }}</span>
          </div>

          <h4 class="ia-recomendaciones__card-title">{{ rec.titulo }}</h4>

          <div class="ia-recomendaciones__card-projection">
            <lucide-icon [img]="TrendingUpIcon" [size]="14" [strokeWidth]="2"></lucide-icon>
            <span>Proyección: {{ rec.proyeccion }}</span>
          </div>

          <div class="ia-recomendaciones__card-detail">
            <lucide-icon [img]="SparklesIcon" [size]="16" [strokeWidth]="1.5"></lucide-icon>
            <p>{{ rec.detalle }}</p>
          </div>
        </div>
      }
    </div>
  </div>
</div>
