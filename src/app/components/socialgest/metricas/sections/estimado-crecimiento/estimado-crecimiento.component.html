<div class="estimado-crec">
  <div class="estimado-crec__header">
    <h3 class="estimado-crec__title">Estimado de crecimiento de seguidores</h3>
    <button class="estimado-crec__menu-btn" aria-label="More options">
      <lucide-icon [img]="MoreHorizontalIcon" [size]="20" [strokeWidth]="1.5"></lucide-icon>
    </button>
  </div>
  <div class="estimado-crec__subtitle">Descripcion corta de estimado de crecimiento de seguidores</div>
  <div class="estimado-crec__chart-wrapper">
    <div class="estimado-crec__y-axis">
      @for (yLabel of yAxisLabels; track yLabel) {
        <span class="estimado-crec__y-label">{{ yLabel }}</span>
      }
    </div>
    <div class="estimado-crec__chart">
      <svg viewBox="0 0 600 200" preserveAspectRatio="none" class="estimado-crec__svg">
        <defs>
          <linearGradient id="areaGradientOrange" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#f47a37" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#f47a37" stop-opacity="0.02"/>
          </linearGradient>
        </defs>
        <path [attr.d]="getAreaPath()" fill="url(#areaGradientOrange)" />
        <path [attr.d]="getLinePath()" fill="none" stroke="#f47a37" stroke-width="2.5"/>
      </svg>
      <div class="estimado-crec__labels">
        @for (label of labels; track label) {
          <span class="estimado-crec__label">{{ label }}</span>
        }
      </div>
    </div>
  </div>
</div>
